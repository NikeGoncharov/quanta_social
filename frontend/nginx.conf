server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed SPA assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history-fallback: any unknown path -> index.html.
    # (The /api/* prefix never reaches nginx — Caddy routes it straight to the backend.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
